<!DOCTYPE html>
<html>
<body>

<script type="module">
import { app } from "./js/firebase.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const auth = getAuth(app);

signOut(auth).then(() => {
  window.location.href = "login.html";
});
</script>

</body>
</html>
